<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stay Close</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      html, body, #root { background-color: #030014 !important; min-height: 100vh; }
      html.light, html.light body, html.light #root { background-color: #f8fafc !important; }
    </style>
    <script>
      (function() {
        var t = localStorage.getItem('sc-theme') || 'dark';
        var bg = t === 'light' ? '#f8fafc' : '#030014';
        document.documentElement.className = t;
        document.documentElement.style.setProperty('background-color', bg, 'important');
        document.body && document.body.style.setProperty('background-color', bg, 'important');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
