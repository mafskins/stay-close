<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stay Close</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #060810;
      --surface:     #0c0f1a;
      --card:        #0f1220;
      --border:      rgba(255,255,255,0.055);
      --border-h:    rgba(255,255,255,0.11);
      --accent:      #00d48a;
      --accent-glow: rgba(0,212,138,0.15);
      --accent-dim:  rgba(0,212,138,0.08);
      --text:        #f0f2f8;
      --text-2:      #8b92ab;
      --text-3:      #3d4462;
      --warn:        #f59e0b;
      --warn-dim:    rgba(245,158,11,0.07);
      --warn-border: rgba(245,158,11,0.18);
      --alert:       #f87171;
      --alert-dim:   rgba(248,113,113,0.07);
      --alert-border:rgba(248,113,113,0.2);
      --radius:      12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 100% 45% at 50% 0%, rgba(0,212,138,0.055) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 100%, rgba(124,111,205,0.04) 0%, transparent 60%);
    }

    .page {
      max-width: 880px;
      margin: 0 auto;
      padding: 2.25rem 1.5rem 5rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.25rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #00d48a 0%, #00a86e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 0 20px rgba(0,212,138,0.25);
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .brand-text p {
      font-size: 0.72rem;
      color: var(--text-3);
      margin-top: 0.2rem;
      letter-spacing: 0.01em;
    }

    .btn-add {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #060810;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1rem;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.01em;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(0,212,138,0);
    }

    .btn-add:hover {
      opacity: 0.88;
      box-shadow: 0 0 20px rgba(0,212,138,0.2);
    }

    .btn-add .plus {
      font-size: 1.1rem;
      line-height: 1;
      font-weight: 400;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }

    .btn-add.open .plus { transform: rotate(45deg); }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.65rem;
      margin-bottom: 2rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.2rem 1rem;
      position: relative;
      overflow: hidden;
    }

    .stat::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
    }

    .stat-n {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      line-height: 1;
      margin-bottom: 0.35rem;
    }

    .stat-n.accent { color: var(--accent); }
    .stat-n.warn   { color: var(--warn); }
    .stat-n.alert  { color: var(--alert); }
    .stat-n.plain  { color: var(--text); }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      font-weight: 600;
    }

    /* ── Collapsible form ── */
    .form-shell {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1);
    }

    .form-shell.open { max-height: 580px; }

    form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
    }

    form::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(90deg, transparent 0%, rgba(0,212,138,0.3) 50%, transparent 100%);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }
    .field.span2 { grid-column: 1 / -1; }

    label {
      font-size: 0.7rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.85rem;
      font-size: 0.92rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    textarea { resize: vertical; min-height: 78px; line-height: 1.5; }

    input:focus, textarea:focus {
      border-color: rgba(0,212,138,0.4);
      box-shadow: 0 0 0 3px rgba(0,212,138,0.06);
    }

    input::placeholder, textarea::placeholder { color: var(--text-3); }

    .form-footer {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.15rem;
    }

    .btn-submit {
      background: var(--accent);
      color: #060810;
      border: none;
      border-radius: 8px;
      padding: 0.62rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
    }

    .btn-submit:hover { opacity: 0.88; }

    #msg { font-size: 0.82rem; min-height: 1em; }
    .ok  { color: var(--accent); }
    .err { color: var(--alert); }

    /* ── Section header ── */
    .section-head {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 0.9rem;
    }

    .section-head h2 {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      color: var(--text-3);
    }

    .pill {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      background: var(--border);
      color: var(--text-3);
    }

    .pill.red   { background: rgba(248,113,113,0.12); color: var(--alert); }
    .pill.green { background: rgba(0,212,138,0.1);    color: var(--accent); }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--alert);
      animation: blink 2s infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%,100% { opacity: 1; box-shadow: 0 0 4px var(--alert); }
      50%      { opacity: 0.3; box-shadow: none; }
    }

    .section-divider { margin-bottom: 2rem; }

    /* ── Card grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 0.75rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.05rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      position: relative;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: riseIn 0.3s ease both;
    }

    .card:hover {
      border-color: var(--border-h);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .card.is-alert {
      background: var(--alert-dim);
      border-color: var(--alert-border);
    }

    .card.is-warn {
      background: var(--warn-dim);
      border-color: var(--warn-border);
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.04s; }
    .card:nth-child(2) { animation-delay: 0.08s; }
    .card:nth-child(3) { animation-delay: 0.12s; }
    .card:nth-child(4) { animation-delay: 0.16s; }
    .card:nth-child(5) { animation-delay: 0.20s; }
    .card:nth-child(6) { animation-delay: 0.24s; }
    .card:nth-child(7) { animation-delay: 0.28s; }
    .card:nth-child(8) { animation-delay: 0.32s; }

    /* Delete button — hidden until hover */
    .btn-delete {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: none;
      border: 1px solid transparent;
      color: var(--text-3);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s, border-color 0.15s, color 0.15s;
      font-family: inherit;
    }

    .card:hover .btn-delete {
      opacity: 1;
    }

    .btn-delete:hover {
      background: rgba(248,113,113,0.12);
      border-color: rgba(248,113,113,0.3);
      color: var(--alert);
    }

    /* Card body */
    .card-row {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding-right: 1.5rem;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 800;
      color: #060810;
      letter-spacing: 0.03em;
    }

    .card-info { min-width: 0; flex: 1; }

    .c-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.01em;
    }

    .c-days {
      font-size: 0.72rem;
      font-weight: 500;
      margin-top: 0.15rem;
    }

    .fresh   { color: var(--accent); }
    .warming { color: var(--warn); }
    .overdue { color: var(--alert); }
    .unseen  { color: var(--text-3); }

    .c-notes {
      font-size: 0.8rem;
      color: var(--text-2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .btn-checkin {
      align-self: flex-start;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-3);
      font-size: 0.74rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      transition: all 0.15s;
    }

    .btn-checkin:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .btn-checkin:disabled { opacity: 0.3; cursor: default; }

    /* Fade-remove animation */
    .card.removing {
      transition: opacity 0.25s, transform 0.25s, max-height 0.3s, padding 0.3s, margin 0.3s;
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
    }

    .empty {
      font-size: 0.85rem;
      color: var(--text-3);
      padding: 0.25rem 0;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="logo-mark">🌿</div>
      <div class="brand-text">
        <h1>Stay Close</h1>
        <p>Built on manaakitanga</p>
      </div>
    </div>
    <button class="btn-add" id="btn-add" onclick="toggleForm()">
      <span class="plus">+</span> Add someone
    </button>
  </header>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat">
      <div class="stat-n plain" id="s-total">—</div>
      <div class="stat-label">Your people</div>
    </div>
    <div class="stat">
      <div class="stat-n accent" id="s-touch">—</div>
      <div class="stat-label">In touch this week</div>
    </div>
    <div class="stat">
      <div class="stat-n" id="s-needs">—</div>
      <div class="stat-label">Need your attention</div>
    </div>
  </div>

  <!-- Collapsible form -->
  <div class="form-shell" id="form-shell">
    <form id="friend-form">
      <div class="form-grid">
        <div class="field span2">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="e.g. Hemi" required>
        </div>
        <div class="field span2">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Kids' names, what they care about, what's going on in their life..."></textarea>
        </div>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn-submit">Add to your whānau</button>
        <div id="msg"></div>
      </div>
    </form>
  </div>

  <!-- Needs attention -->
  <div id="sec-alert" class="section-divider" style="display:none">
    <div class="section-head">
      <span class="pulse-dot"></span>
      <h2>Needs your attention</h2>
      <span class="pill red" id="pill-alert"></span>
    </div>
    <div class="grid" id="grid-alert"></div>
  </div>

  <!-- Recently in touch -->
  <div id="sec-good" class="section-divider" style="display:none">
    <div class="section-head">
      <h2>Recently in touch</h2>
      <span class="pill green" id="pill-good"></span>
    </div>
    <div class="grid" id="grid-good"></div>
  </div>

  <!-- Empty state -->
  <div id="sec-empty" style="display:none">
    <p class="empty">No one added yet. Hit <strong>Add someone</strong> above.</p>
  </div>

</div>
<script>
  const COLORS = ['#00d48a','#7c6fcd','#60a5fa','#f472b6','#fb923c','#a3e635','#e879f9','#34d399'];

  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
    return COLORS[Math.abs(h) % COLORS.length];
  }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function daysSince(d) {
    if (!d) return null;
    return Math.floor((Date.now() - new Date(d)) / 86400000);
  }

  function daysInfo(days) {
    if (days === null) return { cls: 'unseen',  text: 'Never spoken' };
    if (days === 0)    return { cls: 'fresh',   text: 'Spoken today' };
    if (days === 1)    return { cls: 'fresh',   text: 'Spoke yesterday' };
    if (days <= 7)     return { cls: 'fresh',   text: `${days} days since kōrero` };
    if (days <= 21)    return { cls: 'warming', text: `${days} days since kōrero` };
    return               { cls: 'overdue', text: `${days} days since kōrero` };
  }

  function cardClass(days) {
    if (days === null || days > 21) return 'is-alert';
    if (days > 7)                   return 'is-warn';
    return '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildCard(f) {
    const days  = daysSince(f.last_contacted);
    const color = avatarColor(f.name);
    const info  = daysInfo(days);

    const card = document.createElement('div');
    card.className = `card ${cardClass(days)}`;
    card.dataset.id = f.id;

    card.innerHTML = `
      <button class="btn-delete" title="Remove" aria-label="Remove ${esc(f.name)}">✕</button>
      <div class="card-row">
        <div class="avatar" style="background:${color}">${esc(initials(f.name))}</div>
        <div class="card-info">
          <div class="c-name">${esc(f.name)}</div>
          <div class="c-days ${info.cls}">${info.text}</div>
        </div>
      </div>
      ${f.notes ? `<div class="c-notes">${esc(f.notes)}</div>` : ''}
      <button class="btn-checkin">Kōrero ✓</button>
    `;

    card.querySelector('.btn-checkin').addEventListener('click', function () {
      this.disabled = true;
      this.textContent = '…';
      fetch(`/friends/${f.id}/checkin`, { method: 'POST' }).then(loadFriends);
    });

    card.querySelector('.btn-delete').addEventListener('click', function () {
      card.classList.add('removing');
      setTimeout(() => {
        fetch(`/friends/${f.id}`, { method: 'DELETE' }).then(loadFriends);
      }, 220);
    });

    return card;
  }

  function renderGrid(el, friends) {
    el.innerHTML = '';
    if (friends.length === 0) {
      el.innerHTML = '<p class="empty">None here.</p>';
      return;
    }
    friends.forEach(f => el.appendChild(buildCard(f)));
  }

  async function loadFriends() {
    const friends = await fetch('/friends').then(r => r.json());

    // Stats
    const inTouch = friends.filter(f => {
      const d = daysSince(f.last_contacted);
      return d !== null && d <= 7;
    });
    const needsAttn = friends.filter(f => {
      const d = daysSince(f.last_contacted);
      return d === null || d > 14;
    });
    const recent = friends.filter(f => {
      const d = daysSince(f.last_contacted);
      return d !== null && d <= 14;
    });

    document.getElementById('s-total').textContent = friends.length;
    document.getElementById('s-touch').textContent = inTouch.length;

    const sNeeds = document.getElementById('s-needs');
    sNeeds.textContent = needsAttn.length;
    sNeeds.className = 'stat-n ' + (needsAttn.length > 0 ? (needsAttn.length > 3 ? 'alert' : 'warn') : 'accent');

    // Empty state
    document.getElementById('sec-empty').style.display = friends.length === 0 ? 'block' : 'none';

    // Attention section
    const secAlert = document.getElementById('sec-alert');
    if (needsAttn.length > 0) {
      secAlert.style.display = 'block';
      document.getElementById('pill-alert').textContent = needsAttn.length;
      renderGrid(document.getElementById('grid-alert'), needsAttn);
    } else {
      secAlert.style.display = 'none';
    }

    // Good section
    const secGood = document.getElementById('sec-good');
    if (recent.length > 0) {
      secGood.style.display = 'block';
      document.getElementById('pill-good').textContent = recent.length;
      renderGrid(document.getElementById('grid-good'), recent);
    } else {
      secGood.style.display = 'none';
    }
  }

  function toggleForm() {
    const shell = document.getElementById('form-shell');
    const btn   = document.getElementById('btn-add');
    const open  = shell.classList.toggle('open');
    btn.classList.toggle('open', open);
    if (open) setTimeout(() => document.getElementById('name').focus(), 200);
  }

  document.getElementById('friend-form').addEventListener('submit', async e => {
    e.preventDefault();
    const name  = document.getElementById('name').value;
    const notes = document.getElementById('notes').value;
    const msg   = document.getElementById('msg');

    const res = await fetch('/friends', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, notes })
    });

    if (res.ok) {
      msg.textContent = `${name} added.`;
      msg.className = 'ok';
      e.target.reset();
      toggleForm();
      loadFriends();
    } else {
      const err = await res.json();
      msg.textContent = err.error || 'Something went wrong.';
      msg.className = 'err';
    }

    setTimeout(() => { msg.textContent = ''; }, 3000);
  });

  loadFriends();
</script>
</body>
</html>
